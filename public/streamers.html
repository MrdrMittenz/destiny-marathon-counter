<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Destiny 2 Streamers - Marathon Counter</title>
<link rel="stylesheet" href="/style.css">
<style>
.streamer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.streamer-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; overflow: hidden; }
.streamer-card iframe { width: 100%; aspect-ratio: 16/9; border: none; }
.streamer-card .info { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
.streamer-card .name { font-size: 13px; font-weight: 600; color: #fff; }
.streamer-card .live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ef4444; margin-right: 6px; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
.streamer-card .open-link { font-size: 11px; color: rgba(255,255,255,0.3); text-decoration: none; }
.streamer-card .open-link:hover { color: #0099ff; }
.streamer-card.offline { opacity: 0.3; }
.streamer-card.offline:hover { opacity: 0.6; }
.streamer-card .live-badge { display: inline-block; font-size: 9px; font-weight: 700; background: #ef4444; color: #fff; padding: 1px 6px; border-radius: 3px; margin-left: 6px; letter-spacing: 0.5px; }
.streamer-card .off-badge { display: inline-block; font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.25); margin-left: 6px; }
.streamer-card .live-dot.off { background: rgba(255,255,255,0.15); animation: none; }
.streamer-card .viewers { font-size: 10px; color: rgba(255,255,255,0.3); margin-left: 8px; }
.streamer-card .stream-title { font-size: 11px; color: rgba(255,255,255,0.4); padding: 0 16px 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.directory-embed { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
.directory-embed h3 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.3); margin-bottom: 12px; }
.directory-links { display: flex; gap: 12px; flex-wrap: wrap; }
.directory-links a { padding: 8px 20px; border-radius: 8px; font-size: 12px; font-weight: 600; text-decoration: none; transition: all 0.2s; }
.directory-links .twitch-link { background: rgba(145,70,255,0.1); border: 1px solid rgba(145,70,255,0.15); color: #9146ff; }
.directory-links .twitch-link:hover { background: rgba(145,70,255,0.2); }
.directory-links .youtube-link { background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.15); color: #ff0000; }
.directory-links .youtube-link:hover { background: rgba(255,0,0,0.2); }

@media (max-width: 640px) {
  .streamer-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="container">
  <div class="header">
    <h1>Destiny 2 Streamers</h1>
    <div class="subtitle">Live Twitch embeds — sorted by live status, refreshes every 60s</div>
    <div class="update-status" id="status">Loading...</div>
  </div>

  <div class="directory-embed">
    <h3>Watch on Twitch & YouTube</h3>
    <div class="directory-links">
      <a class="twitch-link" href="https://www.twitch.tv/directory/game/Destiny%202" target="_blank">▶️ Destiny 2 on Twitch</a>
      <a class="twitch-link" href="https://www.twitch.tv/directory/game/Marathon" target="_blank">▶️ Marathon on Twitch</a>
      <a class="youtube-link" href="https://www.youtube.com/results?search_query=destiny+2+live+stream" target="_blank">🎬 Destiny 2 on YouTube</a>
    </div>
  </div>

  <div class="streamer-grid" id="streamerGrid"></div>

  <div class="nav-links" style="margin-top:20px">
    <a href="/">← Live Counter</a>
    <a href="/trends">Trends & Charts</a>
    <a href="/analytics">D2 Analytics</a>
    <a href="/legacy">🏛️ Destiny Legacy</a>
  </div>

  <div class="footer">Twitch embeds — click to play</div>
</div>

<script>
async function loadStreamers() {
  const status = document.getElementById('status');
  try {
    const r = await fetch('/api/twitch/top-streamers');
    const data = await r.json();
    const parent = window.location.hostname;
    const grid = document.getElementById('streamerGrid');

    const sorted = [...data.streamers].sort((a, b) => {
      if (a.live && !b.live) return -1;
      if (!a.live && b.live) return 1;
      return 0;
    });

    grid.innerHTML = sorted.map(s => `
      <div class="streamer-card${s.live ? '' : ' offline'}">
        <iframe src="https://player.twitch.tv/?channel=${s.name}&parent=${parent}&autoplay=false" allowfullscreen referrerpolicy="no-referrer"></iframe>
        <div class="info">
          <div>
            <span class="live-dot${s.live ? '' : ' off'}"></span>
            <span class="name">${s.name}</span>
            ${s.live ? '<span class="live-badge">LIVE</span>' : '<span class="off-badge">offline</span>'}
            ${s.live && s.viewers ? `<span class="viewers">${s.viewers.toLocaleString()} viewers</span>` : ''}
          </div>
          <a class="open-link" href="https://www.twitch.tv/${s.name}" target="_blank">${s.live ? 'Watch →' : 'Open →'}</a>
        </div>
        ${s.live && s.title ? `<div class="stream-title">${escHtml(s.title)}</div>` : ''}
      </div>
    `).join('');

    const live = data.liveCount || 0;
    status.textContent = live + '/' + data.total + ' live';
    status.className = 'update-status live';
  } catch (err) {
    status.textContent = 'Error: ' + err.message;
    status.className = 'update-status stale';
  }
}

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

loadStreamers();
setInterval(loadStreamers, 60000);
</script>
</body>
</html>
