<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Destiny 2 vs Marathon - Live Player Count</title>
<meta name="description" content="Live concurrent player count comparison between Destiny 2 and Marathon on Steam">
<meta property="og:title" content="Destiny 2 vs Marathon - Live Player Count">
<meta property="og:description" content="Live concurrent player count comparison">
<meta property="og:image" content="https://placehold.co/1200x630/0a0a0f/ffffff?text=Destiny+2+vs+Marathon+Player+Count&font=inter">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a0f;
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.bg-glow {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.bg-glow::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -25%;
  width: 50%;
  height: 100%;
  background: radial-gradient(ellipse, rgba(0,180,255,0.06) 0%, transparent 70%);
  animation: pulseGlow 4s ease-in-out infinite alternate;
}

.bg-glow::after {
  content: '';
  position: absolute;
  top: -50%;
  right: -25%;
  width: 50%;
  height: 100%;
  background: radial-gradient(ellipse, rgba(255,100,0,0.06) 0%, transparent 70%);
  animation: pulseGlow 4s ease-in-out infinite alternate 2s;
}

@keyframes pulseGlow {
  0% { opacity: 0.5; transform: scale(1); }
  100% { opacity: 1; transform: scale(1.1); }
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 1000px;
  padding: 20px;
}

.header {
  text-align: center;
  margin-bottom: 40px;
}

.header h1 {
  font-size: 14px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 6px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 8px;
}

.header .subtitle {
  font-size: 12px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 2px;
}

.header .update-status {
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  margin-top: 12px;
  transition: color 0.3s;
}

.header .update-status.live {
  color: #22c55e;
}

.header .update-status.stale {
  color: #eab308;
}

.counter-grid {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 24px;
  align-items: center;
}

.card {
  background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 24px;
  padding: 40px 36px;
  backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  opacity: 0.6;
}

.card.destiny {
  text-align: right;
}

.card.destiny::before {
  background: linear-gradient(90deg, transparent, #0099ff, #00ccff);
}

.card.destiny .card-accent {
  position: absolute;
  top: -50%;
  right: -50%;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(0,153,255,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.card.marathon {
  text-align: left;
}

.card.marathon::before {
  background: linear-gradient(90deg, #ff6b00, #ff3300, transparent);
}

.card.marathon .card-accent {
  position: absolute;
  top: -50%;
  left: -50%;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,107,0,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.game-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.3);
  margin-bottom: 4px;
  position: relative;
}

.game-name {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 20px;
  position: relative;
}

.card.destiny .game-name {
  color: #0099ff;
}

.card.marathon .game-name {
  color: #ff6b00;
}

.player-count {
  font-size: 64px;
  font-weight: 900;
  letter-spacing: -2px;
  line-height: 1;
  position: relative;
  font-variant-numeric: tabular-nums;
  transition: color 0.5s;
}

.player-count.up { color: #22c55e; }
.player-count.down { color: #ef4444; }

.count-label {
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.2);
  margin-top: 8px;
}

.vs-divider {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.vs-circle {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
  border: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.3);
}

.diff-bar {
  width: 4px;
  height: 80px;
  border-radius: 2px;
  background: rgba(255,255,255,0.06);
  position: relative;
  overflow: hidden;
}

.diff-bar-fill {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  border-radius: 2px;
  transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  background: linear-gradient(to top, #0099ff, #00ccff);
}

.diff-text {
  font-size: 10px;
  font-weight: 600;
  color: rgba(255,255,255,0.2);
  letter-spacing: 1px;
  text-align: center;
}

.total-bar {
  margin-top: 32px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 100px;
  padding: 4px;
  display: flex;
  position: relative;
  overflow: hidden;
}

.total-bar-d2 {
  height: 8px;
  border-radius: 100px;
  background: linear-gradient(90deg, #0099ff, #00ccff);
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.total-bar-mara {
  height: 8px;
  border-radius: 100px;
  background: linear-gradient(90deg, #ff6b00, #ff3300);
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.platform-breakdown {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 12px;
  font-size: 11px;
  letter-spacing: 0.5px;
}

.platform-breakdown span {
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.04);
}

.platform-breakdown .ps5 { color: #003087; }
.platform-breakdown .xbox { color: #107c10; }
.platform-breakdown .pc { color: #0099ff; }

.est-total {
  margin-top: 12px;
  font-size: 32px;
  font-weight: 900;
  letter-spacing: -1px;
  color: rgba(255,255,255,0.6);
}

.est-total-label {
  font-size: 9px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.15);
  margin-top: 2px;
}

.card.marathon .platform-breakdown { justify-content: flex-start; }
.card.destiny { text-align: right; }

.footer {
  text-align: center;
  margin-top: 24px;
  font-size: 10px;
  color: rgba(255,255,255,0.12);
  letter-spacing: 1px;
}

/* responsive */
@media (max-width: 640px) {
  .counter-grid {
    grid-template-columns: 1fr;
    gap: 12px;
  }
  .vs-divider {
    flex-direction: row;
    gap: 8px;
  }
  .vs-circle {
    width: 40px;
    height: 40px;
    font-size: 12px;
  }
  .diff-bar {
    width: 80px;
    height: 4px;
  }
  .diff-bar-fill {
    bottom: auto;
    left: auto;
    right: auto;
    top: 0;
    height: 100% !important;
    width: 50%;
  }
  .player-count {
    font-size: 48px;
  }
  .game-name {
    font-size: 22px;
  }
  .card {
    padding: 28px 24px;
  }
  .card.destiny, .card.marathon {
    text-align: center;
  }
}
</style>
</head>
<body>
<div class="bg-glow"></div>

<div class="container">
  <div class="header">
    <h1>Live Player Count</h1>
    <div class="subtitle">Steam concurrent players</div>
    <div class="update-status" id="status">Connecting...</div>
  </div>

  <div class="counter-grid">
    <div class="card destiny">
      <div class="card-accent"></div>
      <div class="game-label">Bungie</div>
      <div class="game-name">Destiny 2</div>
      <div class="player-count" id="d2-count">--</div>
      <div class="count-label">Current Players</div>
    </div>

    <div class="vs-divider">
      <div class="vs-circle">VS</div>
      <div class="diff-bar">
        <div class="diff-bar-fill" id="diff-fill" style="height: 50%"></div>
      </div>
      <div class="diff-text" id="diff-text">--</div>
    </div>

    <div class="card marathon">
      <div class="card-accent"></div>
      <div class="game-label">Bungie</div>
      <div class="game-name">Marathon</div>
      <div class="player-count" id="mara-count">--</div>
      <div class="count-label">Current Players</div>
      <div class="platform-breakdown" id="mara-breakdown"></div>
      <div class="est-total" id="mara-total"></div>
    </div>
  </div>

  <div class="total-bar">
    <div class="total-bar-d2" id="bar-d2" style="width: 50%"></div>
    <div class="total-bar-mara" id="bar-mara" style="width: 50%"></div>
  </div>

  <div class="footer">Marathon console counts estimated from PC ratio &mdash; refreshes every 15s</div>
</div>

<script>
const D2_APPID = 1085660;
const MARA_APPID = 3065800;
const REFRESH_MS = 15000;

const RATIO_PC = 126333;
const RATIO_PS5 = 162428;
const RATIO_XBOX = 72190;
const RATIO_TOTAL = RATIO_PC + RATIO_PS5 + RATIO_XBOX;
const RATIO_MULT_PS5 = RATIO_PS5 / RATIO_PC;
const RATIO_MULT_XBOX = RATIO_XBOX / RATIO_PC;
const RATIO_MULT_TOTAL = RATIO_TOTAL / RATIO_PC;

const d2El = document.getElementById('d2-count');
const maraEl = document.getElementById('mara-count');
const statusEl = document.getElementById('status');
const diffFill = document.getElementById('diff-fill');
const diffText = document.getElementById('diff-text');
const barD2 = document.getElementById('bar-d2');
const barMara = document.getElementById('bar-mara');
const maraBreakdown = document.getElementById('mara-breakdown');
const maraTotal = document.getElementById('mara-total');

let prevD2 = null;
let prevMara = null;

function formatNum(n) {
  return n.toLocaleString();
}

function animateCount(el, newVal, oldVal) {
  if (oldVal === null) {
    el.textContent = formatNum(newVal);
    return;
  }
  if (newVal > oldVal) {
    el.className = 'player-count up';
  } else if (newVal < oldVal) {
    el.className = 'player-count down';
  }
  el.textContent = formatNum(newVal);
  setTimeout(() => el.className = 'player-count', 1500);
}

function updateBar(d2, mara) {
  const total = d2 + mara;
  if (total === 0) return;
  const d2Pct = (d2 / total) * 100;
  const maraPct = (mara / total) * 100;
  barD2.style.width = d2Pct + '%';
  barMara.style.width = maraPct + '%';
}

function updateDiff(d2, mara) {
  const total = d2 + mara;
  if (total === 0) return;
  const leader = d2 >= mara ? 'D2' : 'Marathon';
  const diff = Math.abs(d2 - mara);
  const pct = Math.round((diff / total) * 100);
  diffText.textContent = `${leader} +${formatNum(diff)}`;

  const higher = Math.max(d2, mara);
  const fillPct = total > 0 ? (higher / total) * 100 : 50;
  diffFill.style.height = fillPct + '%';
}

const PROXY = 'https://corsproxy.io/?';

async function fetchPlayers() {
  try {
    statusEl.textContent = 'Updating...';
    statusEl.className = 'update-status';

    let d2, mara;

    try {
      const res = await fetch(`/api/players`);
      const data = await res.json();
      d2 = data.destiny2;
      mara = data.marathon;
    } catch (e) {
      const [r1, r2] = await Promise.all([
        fetch(PROXY + encodeURIComponent(`https://api.steampowered.com/ISteamUserStats/GetNumberOfCurrentPlayers/v1/?appid=${D2_APPID}`)),
        fetch(PROXY + encodeURIComponent(`https://api.steampowered.com/ISteamUserStats/GetNumberOfCurrentPlayers/v1/?appid=${MARA_APPID}`))
      ]);
      const [j1, j2] = await Promise.all([r1.json(), r2.json()]);
      d2 = j1.response.player_count;
      mara = j2.response.player_count;
    }

    animateCount(d2El, d2, prevD2);
    animateCount(maraEl, mara, prevMara);

    const estPs5 = Math.round(mara * RATIO_MULT_PS5);
    const estXbox = Math.round(mara * RATIO_MULT_XBOX);
    const estTotal = Math.round(mara * RATIO_MULT_TOTAL);

    maraBreakdown.innerHTML = `
      <span class="pc">Steam ${formatNum(mara)}</span>
      <span class="ps5">PS5 ${formatNum(estPs5)}</span>
      <span class="xbox">Xbox ${formatNum(estXbox)}</span>
    `;
    maraTotal.innerHTML = `${formatNum(estTotal)} <span class="est-total-label">Estimated Total</span>`;

    updateBar(d2, estTotal);
    updateDiff(d2, estTotal);

    prevD2 = d2;
    prevMara = mara;

    statusEl.textContent = `Live \u2022 Updated ${new Date().toLocaleTimeString()}`;
    statusEl.className = 'update-status live';
  } catch (err) {
    statusEl.textContent = `Error: ${err.message}`;
    statusEl.className = 'update-status stale';
  }
}

fetchPlayers();
setInterval(fetchPlayers, REFRESH_MS);
</script>
</body>
</html>
